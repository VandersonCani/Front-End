<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div class="topnav">
            <a href="exercicio.html">Home Page</a>
            <a href="conteudo.html">Produtos</a>
            <a href="inscreva-se.html">Increva-se</a>
        </div>
        <header id="topconteudo"><a>Fã Clube de Qualqueres Coisas</a></header>
    </header>
    <section class="form-container">
        <div class="container">
            <form action="">
                <h1>Inscreva-se para receber noticias de Qualquer Coisa</h1>

                <h3>Informações Pessoais</h3>

                <div class="input-single">
                    <input type="text" name="" id="nome-box" class="input" autocomplete="off" required>
                    <label for="nome-box">Nome Completo (EX: João Silva)</label>
                </div>

                <div class="input-single">
                    <input type="email" name="" id="email-box" class="input" autocomplete="off" required>
                    <label for="email-box">Email (Ex:João.silva@gmail.com)</label>
                </div>

                <div class="input-single">
                    <input type="password" name="" id="senha-box" class="input" autocomplete="off" required>
                    <label for="senha-box">Senha (Ex: Abcd@1234)</label>
                </div>

                <div class="input-single">
                    <input type="password" name="" id="senha-box" class="input" autocomplete="off" required>
                    <label for="senha-box">Repetir Senha (Ex: Abcd@1234)</label>
                </div>
            </form>
        </div>
    </section>
</body>

</html>
